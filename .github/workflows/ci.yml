name: CI

# Compilation et tests à chaque poussée sur la branche principale et sur les PR.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Récupérer les sources
        uses: actions/checkout@v4

      - name: Installer le SDK .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurer les dépendances
        run: dotnet restore MisterGPhotos.sln

      - name: Compiler (Release)
        run: dotnet build MisterGPhotos.sln -c Release --no-restore

      - name: Tests
        run: dotnet test src/MisterGPhotos.Tests/MisterGPhotos.Tests.csproj -c Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Publier les résultats de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultats-tests
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore
